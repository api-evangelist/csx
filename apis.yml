apis: []
features:
  - name: ShipCSX Customer Portal
    description: Web portal for customers to place orders, request waybills, and track shipments.
  - name: EDI Integration
    description: B2B EDI exchange for shipment tendering, status updates, and invoicing with rail customers.
  - name: Shipment Tracking
    description: Real-time and historical tracking of railcars and intermodal containers.
  - name: Pricing and Contracts
    description: Customer access to pricing, lane contracts, and tariff information.
  - name: Intermodal Services
    description: Container and trailer-on-flatcar services connecting ports, terminals, and inland customers.
useCases:
  - name: Shipper Operations
    description: Industrial shippers manage rail tenders, waybills, and exceptions through ShipCSX.
  - name: Logistics Visibility
    description: 3PLs and carriers integrate CSX shipment status into transportation management systems.
  - name: Intermodal Logistics
    description: Container drayage and intermodal partners coordinate moves across the CSX network.
  - name: Fleet Management
    description: Private railcar fleet owners track utilization and locations across the network.
