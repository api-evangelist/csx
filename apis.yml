kind: company
name: CSX Corporation
description: >-
  CSX Corporation is a Class I freight railroad operating one of the largest
  rail networks in the eastern United States, serving 23 states with roughly
  20,000 route miles of track. CSX moves bulk commodities, intermodal
  shipments, and merchandise for industrial customers and operates the
  ShipCSX customer portal for shipment management, EDI integration, and
  freight tracking.
